<h1 id="microservices">Microservices<a aria-hidden="true" class="anchor-heading icon-link" href="#microservices"></a></h1>
<p>The term <em>microservices</em> is a new way to create applications. You need to see microservices as a way to decompose monolithic applications into different and independent components that follow the twelve-factor app guide.</p>
